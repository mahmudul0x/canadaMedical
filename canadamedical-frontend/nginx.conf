# ─────────────────────────────────────────────────────────────────────────────
# Production Nginx config for the React SPA
# Served on port 80 inside the container; TLS is terminated at the VPS host
# by Certbot/Nginx running on the host (see deploy/nginx-host.conf).
# ─────────────────────────────────────────────────────────────────────────────

# Tune worker count to available CPUs (auto = number of cores)
# Set in /etc/nginx/nginx.conf — this file is a server{} block only.

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/cache-manifest
    text/calendar
    text/css
    text/javascript
    text/markdown
    text/plain
    text/xml
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
        always;

    # CSP: tighten per your actual CDN/font sources
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com data:; \
         img-src 'self' data: https: blob:; \
         connect-src 'self' wss: https:; \
         frame-ancestors 'none'; \
         base-uri 'self'; \
         form-action 'self';"
        always;

    # Remove server version from headers
    server_tokens off;

    # ── SPA routing fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must NOT be cached — browser always fetches fresh to pick
        # up new asset hashes after a deploy
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            # Re-apply security headers inside nested location
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }

    # ── Immutable hashed assets (JS/CSS bundles from Vite) ───────────────────
    # Vite names them assets/index-[hash].js — safe to cache forever
    location ~* ^/assets/ {
        expires max;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── Other static files (fonts, images, icons) ────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── Health probe (used by Docker HEALTHCHECK + load balancer) ────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Block common attack vectors ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|svn|htaccess|htpasswd|bak|log|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom error pages ───────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
