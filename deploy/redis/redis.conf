# ─────────────────────────────────────────────────────────────────────────────
# Redis production configuration
# Mounted into the container at /usr/local/etc/redis/redis.conf
# ─────────────────────────────────────────────────────────────────────────────

# Bind only to internal Docker network interface — never expose to host
bind 0.0.0.0
protected-mode yes

port 6379

# ── Authentication ────────────────────────────────────────────────────────────
# Password is injected via environment variable substitution in docker-compose:
#   command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
# Do NOT hardcode the password here.

# ── Persistence (AOF + RDB for durability) ────────────────────────────────────
# AOF: every write is appended — best durability, ~2x disk I/O
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec          # fsync every second — good balance
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshot as a safety net (AOF is primary)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ── Memory management ────────────────────────────────────────────────────────
# Set to ~75% of what Docker memory limit allows for Redis
maxmemory 256mb
maxmemory-policy allkeys-lru   # evict least-recently-used when full

# ── Security ─────────────────────────────────────────────────────────────────
# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""
rename-command SHUTDOWN REDIS_SHUTDOWN_SECRET

# ── Performance ──────────────────────────────────────────────────────────────
tcp-backlog 511
timeout 300
tcp-keepalive 60
databases 2                   # DB 0 = Celery/Channels, DB 1 = spare
hz 15
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""                    # stdout → captured by Docker log driver
