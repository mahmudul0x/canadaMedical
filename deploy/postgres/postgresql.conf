# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL production tuning — for a 2–4 GB VPS
# Mounted read-only into the postgres container.
#
# Based on pgtune.leopard.in.ua recommendations for:
#   - 2 GB RAM, web application, 50–100 connections (via pgBouncer)
# ─────────────────────────────────────────────────────────────────────────────

# ── Connections ───────────────────────────────────────────────────────────────
# pgBouncer pool size = 20; keep max_connections low to save memory
max_connections = 50

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 256MB           # 25% of RAM
work_mem = 10MB                  # per sort/join operation
maintenance_work_mem = 64MB
effective_cache_size = 768MB     # OS + Postgres cache estimate

# ── WAL / Checkpoints ─────────────────────────────────────────────────────────
wal_buffers = 8MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# ── Query planner ─────────────────────────────────────────────────────────────
random_page_cost = 1.1           # SSD storage (Hostinger VPS uses NVMe)
effective_io_concurrency = 200
default_statistics_target = 100

# ── Parallelism ───────────────────────────────────────────────────────────────
max_worker_processes = 2
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_parallel_maintenance_workers = 1

# ── Logging ───────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off          # Docker captures stdout/stderr
log_min_duration_statement = 500 # log queries slower than 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# ── Timezone ──────────────────────────────────────────────────────────────────
timezone = 'America/Toronto'
