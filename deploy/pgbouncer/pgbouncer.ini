# ─────────────────────────────────────────────────────────────────────────────
# pgBouncer — connection pooler between Django and PostgreSQL
#
# Pool mode: transaction (recommended for Django with persistent connections)
# Django connects to pgBouncer:5432; pgBouncer pools to postgres:5432
# ─────────────────────────────────────────────────────────────────────────────

[databases]
# Alias "canadian_med_db" → real PostgreSQL service
# DB_NAME, DB_USER, DB_PASSWORD, DB_HOST are substituted by Docker entrypoint
canadian_med_db = host=db port=5432 dbname=canadian_med_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

# Authentication: md5 matches Django's psycopg2 driver default
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ── Pool settings ─────────────────────────────────────────────────────────────
# transaction mode: connection returned after each transaction (best for APIs)
pool_mode = transaction

# Max connections pgBouncer will open to PostgreSQL
# PostgreSQL default max_connections = 100; reserve 10 for admin/maintenance
server_pool_size = 20

# Max client connections across all databases (connections from Django containers)
max_client_conn = 200

# Reserve pool for bursts — activated when main pool is exhausted
reserve_pool_size = 5
reserve_pool_timeout = 3

# ── Connection lifecycle ──────────────────────────────────────────────────────
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
server_login_retry = 3

client_idle_timeout = 0
client_login_timeout = 60

# ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

# ── Security ──────────────────────────────────────────────────────────────────
# Ignore SET commands from Django's connection setup
ignore_startup_parameters = extra_float_digits,options

# Admin console (connect as pgbouncer user to pgbouncer database)
admin_users = pgbouncer_admin
