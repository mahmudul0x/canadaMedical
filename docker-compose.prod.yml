# ─────────────────────────────────────────────────────────────────────────────
# Production Docker Compose
#
# Usage on VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Image tags are set by CI via IMAGE_TAG env var (git SHA or semver).
# All secrets come from .env.production — never hardcoded here.
# ─────────────────────────────────────────────────────────────────────────────

x-backend-common: &backend-common
  image: ${REGISTRY:-ghcr.io}/${IMAGE_REPO}/canadamed-backend:${IMAGE_TAG:-latest}
  restart: unless-stopped
  env_file: .env.production
  environment:
    DB_HOST: pgbouncer
    DB_PORT: 5432
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── pgBouncer — connection pooler ────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./deploy/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Django / Daphne (web) ────────────────────────────────────────────────────
  backend:
    <<: *backend-common
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - backend_logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"    # bind to loopback only — host Nginx proxies
    command: ["daphne"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery-worker:
    <<: *backend-common
    volumes:
      - media_files:/app/media
      - backend_logs:/app/logs
    command: ["worker"]
    healthcheck:
      # Celery writes a heartbeat file every 10s; check its mtime
      test: ["CMD-SHELL",
        "celery -A core inspect ping -d celery@$$HOSTNAME --timeout 5 2>/dev/null | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
      replicas: 1       # increase for higher throughput

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  celery-beat:
    <<: *backend-common
    volumes:
      - backend_logs:/app/logs
    command: ["beat"]
    # Beat must be a singleton — never scale replicas > 1
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
      replicas: 1
    depends_on:
      backend:
        condition: service_healthy

  # ── React / Nginx (frontend) ─────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_REPO}/canadamed-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"      # bind to loopback only — host Nginx proxies
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    internal: false        # backend can reach internet (for S3, Stripe, Resend)
  frontend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  backend_logs:
    driver: local
